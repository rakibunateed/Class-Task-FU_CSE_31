<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Sign Up</h2>
    <table width="300">
        <tr>
            <td>
                <fieldset>
                    <legend>Create Account</legend>

                    Username:<br>
                    <input type="text" name="username" size="30" placeholder="Your Username"><br><br>

                    Email:<br>
                    <input type="email" name="email" size="30" placeholder="Your Email"><br><br>

                    Password:<br>
                    <input type="password" name="password" size="30" placeholder="Enter Password"><br><br>

                    Confirm Password:<br>
                    <input type="password" name="confirm_password" size="30" placeholder="Confirm Password"><br><br>

                    <input type="submit" value="Sign Up"><br><br>

                    <a href="#">Already have an account? Sign In</a>

                </fieldset>
            </td>
        </tr>
    </table>
</body>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp</title>
    <link rel="stylesheet" href="SignUp.css" />
  </head>

  <body>
    <h2>Sign-Up</h2>
    <table width="300">
      <tr>
        <td>
          <fieldset>
            <legend>Create Account</legend>

            Username:<br />
            <input
              type="text"
              name="username"
              size="30"
              placeholder="Your Username"
            /><br /><br />

            Email:<br />
            <input
              type="email"
              name="email"
              size="30"
              placeholder="Your Email"
            /><br /><br />

            Password:<br />
            <input
              type="password"
              name="password"
              size="30"
              placeholder="Enter Password"
            /><br /><br />

            Confirm Password:<br />
            <input
              type="password"
              name="confirm_password"
              size="30"
              placeholder="Confirm Password"
            /><br /><br />

            <input type="submit" value="Sign Up" /><br /><br />

            <p class="signin-text">
              Already have an account? <a href="SignIn.html">Sign In</a>
            </p>
          </fieldset>
        </td>
      </tr>
    </table>
  </body>
</html>

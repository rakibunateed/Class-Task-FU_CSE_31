<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="login.css">

</head>

<body class="inter">

    <div class="login">
        <h2 class="login-title">Login</h2>
        <p class="description">Login your account in a seconds</p>

        <input class="data" type="email" placeholder="Email Address"><br><br>
        <input class="data" type="password" placeholder="Password"><br><br>

        <div class="check-content">
            <div class="check-item">
                <input type="checkbox" name="" id="">
                <p class="description">Keep me logged in </p>
            </div>

            <a id="forgot" href="">Forgot Password</a>

        </div>

        <input id="submit" type="submit" value="Log in ">

        <p class="description">Don’t have an account? <span id="signup">Sign up</span></p>
        
    </div>
</body>
</html>

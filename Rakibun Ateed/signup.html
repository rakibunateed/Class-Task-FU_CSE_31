<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <link rel="stylesheet" href="signup.css">

</head>

<body class="inter">

    <div class="signin">
        <h2 class="signin-title">Sign in</h2>
        <p class="description">Create your account in a seconds</p>

        <input class="data" type="text" placeholder="Username"><br><br>
        <input class="data" type="email" placeholder="Email Address"><br><br>
        <input class="data" type="password" placeholder="Create Password"><br><br>
        <input class="data" type="password" placeholder="Confirm Password"><br><br>


            <div class="check-item">
                <input type="checkbox" name="" id="">
                <p class="description">I agree to the terms and privacy policy</p>
            </div>

        <input id="create" type="submit" value="Create an account">

        <p class="description">Already a member? <span id="login">Login</span></p>
        
    </div>
</body>
</html>
